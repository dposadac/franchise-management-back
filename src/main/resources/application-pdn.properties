# ============================================================
# PRODUCTION PROFILE - All variables via secrets manager
# Swagger disabled. Logging minimal.
# ============================================================

# Database
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_PLATFORM}
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

# Swagger DISABLED in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Cloud Provider (aws | azure | gcp)
cloud.provider=${CLOUD_PROVIDER:aws}

# AWS
cloud.aws.region=${AWS_REGION:us-east-1}
cloud.aws.secrets-manager.enabled=${AWS_SECRETS_ENABLED:true}
cloud.aws.secrets-manager.secret-name=${AWS_SECRET_NAME}

# Azure
cloud.azure.key-vault.enabled=${AZURE_KEYVAULT_ENABLED:false}
cloud.azure.key-vault.uri=${AZURE_KEYVAULT_URI:}

# GCP
cloud.gcp.project-id=${GCP_PROJECT_ID:}
cloud.gcp.secret-manager.enabled=${GCP_SECRET_ENABLED:false}

# Logging
logging.level.com.accenture=WARN
logging.level.root=ERROR
