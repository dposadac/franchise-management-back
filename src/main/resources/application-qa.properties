# ============================================================
# QA PROFILE - External database required
# All DB_* variables must be set via environment / secrets
#
# AWS RDS (PostgreSQL):
#   DB_URL=jdbc:postgresql://<rds-host>:5432/<dbname>
#   DB_DRIVER=org.postgresql.Driver
#   DB_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
#
# Azure SQL:
#   DB_URL=jdbc:sqlserver://<server>.database.windows.net:1433;database=<db>;encrypt=true
#   DB_DRIVER=com.microsoft.sqlserver.jdbc.SQLServerDriver
#   DB_PLATFORM=org.hibernate.dialect.SQLServerDialect
#
# GCP Cloud SQL (PostgreSQL):
#   DB_URL=jdbc:postgresql:///<dbname>?cloudSqlInstance=<project>:<region>:<instance>&socketFactory=com.google.cloud.sql.postgres.SocketFactory
#   DB_DRIVER=org.postgresql.Driver
#   DB_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
# ============================================================

# Database
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_PLATFORM}
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}

# Cloud Provider (aws | azure | gcp)
cloud.provider=${CLOUD_PROVIDER:aws}

# AWS
cloud.aws.region=${AWS_REGION:us-east-1}
cloud.aws.secrets-manager.enabled=${AWS_SECRETS_ENABLED:false}
cloud.aws.secrets-manager.secret-name=${AWS_SECRET_NAME:}

# Azure
cloud.azure.key-vault.enabled=${AZURE_KEYVAULT_ENABLED:false}
cloud.azure.key-vault.uri=${AZURE_KEYVAULT_URI:}

# GCP
cloud.gcp.project-id=${GCP_PROJECT_ID:}
cloud.gcp.secret-manager.enabled=${GCP_SECRET_ENABLED:false}

# Logging
logging.level.com.accenture=INFO
logging.level.root=WARN
