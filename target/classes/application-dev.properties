# ============================================================
# DEV PROFILE
# Override with environment variables for external DB
# AWS RDS:      DB_URL=jdbc:postgresql://<host>:5432/<db>
# Azure SQL:    DB_URL=jdbc:sqlserver://<host>:1433;database=<db>
# GCP Cloud SQL:DB_URL=jdbc:postgresql:///<db>?cloudSqlInstance=<project>:<region>:<instance>
# ============================================================

# Database (defaults to H2 file-based for local dev)
spring.datasource.url=${DB_URL:jdbc:h2:file:./devdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}

# Cloud Provider (aws | azure | gcp)
cloud.provider=${CLOUD_PROVIDER:local}
cloud.aws.region=${AWS_REGION:us-east-1}
cloud.azure.key-vault.uri=${AZURE_KEYVAULT_URI:}
cloud.gcp.project-id=${GCP_PROJECT_ID:}

# Logging
logging.level.com.accenture=DEBUG
logging.level.org.springframework.web=INFO
